name: Checkov IaC Scan

on:
  workflow_call:
    
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  checkov-scan:
    name: Checkov Scan (SARIF filtered)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov

      - name: Run Checkov (generate SARIF)
        run: |
          checkov -d . \
            --quiet \
            --soft-fail \
            --output sarif \
            --output-file-path checkov-results.sarif

      - name: Verify SARIF output exists
        run: |
          if [ ! -f "checkov-results.sarif/results_sarif.sarif" ]; then
            echo "Error: SARIF file not found at expected location: checkov-results.sarif/results_sarif.sarif"
            exit 1
          fi

      - name: Filter test fixtures out of SARIF
        run: |
          set -euo pipefail
          SARIF_FILE="checkov-results.sarif/results_sarif.sarif"
          echo "Filtering SARIF file at: $SARIF_FILE"

              cat >/tmp/filter-sarif.py <<'PYEOF'
          import json
          import sys
          from pathlib import Path

          EXCLUDED = ["tests/", "test/", "target/", "node_modules/", ".mvn/", ".github/"]

          def should_exclude(uri):
              n = uri.replace("file://", "").lstrip("/")
              return any(n.startswith(p) for p in EXCLUDED)

          def main():
              if len(sys.argv) != 2:
                  print(f"Usage: {sys.argv[0]} <sarif-file>", file=sys.stderr)
                  return 2

              path = Path(sys.argv[1])
              if not path.exists():
                  print(f"ERROR: not found: {path}", file=sys.stderr)
                  return 1

              with path.open("r", encoding="utf-8") as f:
                  sarif = json.load(f)

              runs = sarif.get("runs", [])
              if not runs:
                print("No runs found in SARIF; nothing to filter.")
                return 0

              total = removed = 0

              for run in runs:
                  results = run.get("results", [])
                  total += len(results)
                  kept = []

              for r in results:
                  if any(
                      should_exclude(
                          l.get("physicalLocation", {})
                           .get("artifactLocation", {})
                           .get("uri", "")
                      )
                      for l in r.get("locations", [])
                  ):
                      removed += 1
                  else:
                      kept.append(r)

              run["results"] = kept

          print(f"SARIF filter: {total} findings -> {total - removed} kept, {removed} removed")

          with path.open("w", encoding="utf-8") as f:
             json.dump(sarif, f, indent=2)

          print(f"Filtered SARIF written to: {path}")
          return 0
          
          raise SystemExit(main())
          PYEOF

              python3 /tmp/filter-sarif.py "$SARIF_FILE"
          
      - name: Upload SARIF file (Source Code)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif/results_sarif.sarif
          category: checkov-scan
