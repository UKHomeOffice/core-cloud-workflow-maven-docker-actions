name: Maven Build
description: "Runs the Maven lifecycle: validate → compile → test → package"

inputs:
  working_directory:
    description: "Path to the Maven project root"
    required: false
    default: "."
  maven_args:
    description: "Additional arguments appended to every mvn command"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Maven validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mvn validate \
          --batch-mode \
          --no-transfer-progress \
          ${{ inputs.maven_args }}

    - name: Maven compile
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mvn compile \
          --batch-mode \
          --no-transfer-progress \
          ${{ inputs.maven_args }}

    - name: Maven test
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mvn test \
          --batch-mode \
          --no-transfer-progress \
          ${{ inputs.maven_args }}

    - name: Maven package (skip tests)
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        mvn package \
          --batch-mode \
          --no-transfer-progress \
          -DskipTests \
          ${{ inputs.maven_args }}

    - name: Confirm artifact produced
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail

        echo "## ☕ Maven Build Artifact" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

        # Find jar/war artifacts (ignore missing target)
        if [ -d "target" ]; then
          found=false
          while IFS= read -r f; do
            found=true
            size=$(du -sh "$f" | cut -f1)
            echo "| \`$f\` | $size |" >> "$GITHUB_STEP_SUMMARY"
          done < <(find target -maxdepth 1 \( -name "*.jar" -o -name "*.war" \) 2>/dev/null)

          if [ "$found" = false ]; then
            echo "| (none found) | - |" >> "$GITHUB_STEP_SUMMARY"
          fi
        else
          echo "| target/ not found | - |" >> "$GITHUB_STEP_SUMMARY"
        fi